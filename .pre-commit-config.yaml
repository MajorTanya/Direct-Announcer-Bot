# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell

  - repo: https://github.com/thlorenz/doctoc
    rev: v2.3.0
    hooks:
      - id: doctoc
        args: [ README.md, --notitle, --minlevel, "2", --github ]
        files: ^README.md$

  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        additional_dependencies: [ flake8-walrus==1.2.0 ]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-toml
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/asottile/add-trailing-comma
    rev: v4.0.0
    hooks:
      - id: add-trailing-comma

  - repo: https://github.com/pycqa/isort
    rev: 8.0.0
    hooks:
      - id: isort
        args: [ --profile, black, --filter-files ]

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.1.0
    hooks:
      - id: black
        language_version: python3.14

  - repo: https://github.com/jazzband/pip-tools
    rev: v7.5.3
    hooks:
      - id: pip-compile
        name: pip-compile requirements-dev.txt
        args: [ --quiet, --extra=dev, --output-file=requirements-dev.txt, --strip-extras, pyproject.toml ]
        files: ^pyproject\.toml$
      - id: pip-compile
        name: pip-compile requirements.txt
        args: [ --quiet, --output-file=requirements.txt, --strip-extras, pyproject.toml ]
        files: ^pyproject\.toml$
